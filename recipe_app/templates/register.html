<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css" />
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
    <style>
      body {
        background: radial-gradient(circle at center, purple, black);
      }
      p{
        font-weight: 600;
        font-size: 20px;
        color: silver;
      }
      .myform{
        padding: 0 25px 0 33px;
        padding-left: 20px;
        color: silver;
        white-space: pre;
        margin: 0 -45px;
      }
      .myform input{
        width: 420px;
        position: absolute;
      }
      .form-control{
        border: 1px solid #57557A;
        border-radius: 3px;
        background: #212042;
        margin-bottom: 20px;
        letter-spacing: 1px;
        
      }
      .form-control:focus{
        border: 1px solid #57557A;
        border-radius: 3px;
        box-shadow: none;
        background: #212042;
        color: #fff;
        letter-spacing: 1px;
      }
      .password-container #togglePassword {
        float: right;
        margin-left: 400px;
        margin-top: -23px;
        position: absolute;
      }
      .password-container input{
        padding-right: 30px;
      }
      .confirm-password-container input{
        padding-right: 30px;
      }
      .confirm-password-container #toggleConfirmPassword {
        float: right;
        margin-left: 400px;
        margin-top: -23px;
        position: absolute;
      }
    </style>
</head>
<div class="col-md-8">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">
          {{ message }}
          <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}
</div>
<body>
    <a href="{{ url_for('recipes') }}" class="btn btn-dark">&laquo; Home</a>
    <div class="container">
      <div class="row d-flex justify-content-center mt-5">
        <div class="col-12 col-md-8 col-lg-6 col-xl-5">
          <div class="card py-3 px-2"  style="width: 50rem; background-color: transparent;">
            <h2 class="fw-bold mb-2 text-uppercase" style="color: silver;">Signup</h2>
            <p class="text-white-50 mb-5">Create an account to add, update, and delete recipes</p>
            <form class="myform" action="/register" method="POST">
              <div class="name-container">
                <label>Name:</label>
                <input type="text" name="name" required>
              </div>
              <div class="email-container">
                <label>Email:</label>
                <input type="email" name="email" required>
              </div>
              <div class="password-container">
                <label>Password:</label>
                <input type="password" type="password" name="password" id="password" required>
                <span class="bi bi-eye-slash" id="togglePassword"></span>
              </div>
              <div class="confirm-password-container">
                <label>Confirm Password:</label>
                <input type="password" name="confirm password" id="confirm_password" required>
                <span class="bi bi-eye-slash" id="toggleConfirmPassword"></span>
              </div>
              <br>
              <button data-mdb-button-init data-mdb-ripple-init class="btn btn-outline-light btn-lg px-5" type="submit">Signup</button>
            </form>
            <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
          </div>
        </div>
      </div>
    </div>
    <script>
        const togglePassword = document
            .querySelector('#togglePassword');
        const password = document.querySelector('#password');
        togglePassword.addEventListener('click', () => {
            // Toggle the type attribute using
            // getAttribure() method
            const type = password
                .getAttribute('type') === 'password' ?
                'text' : 'password';
            password.setAttribute('type', type);
            // Toggle the eye and bi-eye icon
            this.classList.toggle('bi-eye');
        });

        const toggleconfirmPassword = document
            .querySelector('#toggleConfirmPassword');
        const confirm_password = document.querySelector('#confirm_password');
        toggleconfirmPassword.addEventListener('click', () => {
            // Toggle the type attribute using
            // getAttribure() method
            const type = confirm_password
                .getAttribute('type') === 'password' ?
                'text' : 'password';
            confirm_password.setAttribute('type', type);
            // Toggle the eye and bi-eye icon
            this.classList.toggle('bi-eye');
        });
    </script>
</body>
</html>
